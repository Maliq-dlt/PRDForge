openapi: 3.0.3
info:
  title: AI PRD Builder API Documentation
  description: API specifications for AI PRD Builder backend, providing authentication, project management, and AI provider integration.
  version: 1.0.0
servers:
  - url: http://localhost:8000/api/v1
    description: Local development server
paths:
  /register:
    post:
      summary: Register a new user
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - email
                - password
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minimum: 8
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
                  token:
                    type: string
        '422':
          description: Validation error

  /login:
    post:
      summary: User login
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
                  token:
                    type: string
        '422':
          description: Invalid credentials

  /logout:
    post:
      summary: Log out user and revoke current token
      tags:
        - Authentication
      security:
        - SanctumToken: []
      responses:
        '200':
          description: Logged out successfully
        '401':
          description: Unauthenticated

  /projects:
    get:
      summary: List all projects (paginated)
      tags:
        - Projects
      security:
        - SanctumToken: []
      responses:
        '200':
          description: Paginated projects list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Project'
                  links:
                    $ref: '#/components/schemas/PaginationLinks'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'

  /ai-providers:
    get:
      summary: List all AI providers (paginated)
      tags:
        - AI Providers
      security:
        - SanctumToken: []
      responses:
        '200':
          description: Paginated AI providers list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AiProvider'
    post:
      summary: Create an AI provider
      tags:
        - AI Providers
      security:
        - SanctumToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - provider
              properties:
                name:
                  type: string
                provider:
                  type: string
                authType:
                  type: string
                  default: api_key
                apiKey:
                  type: string
                model:
                  type: string
                endpointUrl:
                  type: string
      responses:
        '201':
          description: AI provider created successfully

  /ai-providers/{id}/verify:
    post:
      summary: Verify AI provider status (dispatched to background queue)
      tags:
        - AI Providers
      security:
        - SanctumToken: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Verification job dispatched to background queue

components:
  securitySchemes:
    SanctumToken:
      type: http
      scheme: bearer
      description: Enter the Sanctum plain-text token.
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          format: email
        created_at:
          type: string
          format: date-time
    Project:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        status:
          type: string
        currentStage:
          type: string
        summary:
          type: string
        stackDecision:
          type: object
        updatedAt:
          type: string
          format: date-time
    AiProvider:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        provider:
          type: string
        authType:
          type: string
        model:
          type: string
        endpointUrl:
          type: string
        status:
          type: string
    PaginationLinks:
      type: object
      properties:
        first:
          type: string
        last:
          type: string
        prev:
          type: string
        next:
          type: string
    PaginationMeta:
      type: object
      properties:
        current_page:
          type: integer
        from:
          type: integer
        last_page:
          type: integer
        per_page:
          type: integer
        to:
          type: integer
        total:
          type: integer
